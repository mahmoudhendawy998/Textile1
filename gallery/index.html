<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>معرض الصور</title>
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
      background: #000;
    }

    body {
      height: 100%;
      background: #000;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* ══════════════════════════════
       LOADING
    ══════════════════════════════ */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
      transition: opacity 0.5s ease;
    }
    #loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loader.gone { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loader span {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      letter-spacing: 0.1em;
    }

    /* ══════════════════════════════
       EMPTY STATE
    ══════════════════════════════ */
    #empty {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
      text-align: center;
      z-index: 10;
    }
    #empty.show { display: flex; }
    #empty svg { opacity: 0.25; margin-bottom: 8px; }
    #empty h2 { color: #fff; font-size: 20px; font-weight: 400; }
    #empty p  { color: rgba(255,255,255,0.45); font-size: 13px; line-height: 1.8; }
    #empty code { color: rgba(255,200,100,0.9); font-size: 12px; }

    /* ══════════════════════════════
       MAIN VIEWER
    ══════════════════════════════ */
    #viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #000;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Each slide */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide img {
      display: block;
      max-width:  100%;
      max-height: 100%;
      width:  auto;
      height: auto;
      object-fit: contain;
      -webkit-touch-callout: none;
      pointer-events: none;
    }

    /* ══════════════════════════════
       TOP HUD
    ══════════════════════════════ */
    #hud-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding-top: env(safe-area-inset-top, 0px);
      z-index: 100;
      pointer-events: none;
    }
    .hud-inner-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 18px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }
    #title-text {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
    #counter {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
    }

    /* ══════════════════════════════
       BOTTOM HUD
    ══════════════════════════════ */
    #hud-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
      pointer-events: all;
    }
    .hud-inner-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
      gap: 16px;
    }

    /* Nav buttons */
    .nav {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      touch-action: manipulation;
    }
    .nav:active { background: rgba(255,255,255,0.25); }
    .nav svg { pointer-events: none; }

    /* Dots */
    #dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      flex-wrap: wrap;
      max-height: 30px;
      overflow: hidden;
    }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: background 0.25s, transform 0.25s;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .dot.active {
      background: #fff;
      transform: scale(1.5);
    }

    /* ══════════════════════════════
       SWIPE HINT
    ══════════════════════════════ */
    #hint {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.12em;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      animation: hintAnim 2.8s ease forwards;
    }
    @keyframes hintAnim {
      0%   { opacity: 0; }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; }
    }

  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loader">
    <div class="spinner"></div>
    <span>جار التحميل…</span>
  </div>

  <!-- Empty -->
  <div id="empty">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="10" width="44" height="36" rx="4" stroke="white" stroke-width="1.5"/>
      <circle cx="19" cy="22" r="4" stroke="white" stroke-width="1.5"/>
      <path d="M6 38 L18 26 L27 35 L37 24 L50 38" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <h2>لا توجد صور</h2>
    <p>ضع صورك في مجلد <code>photos/</code><br/>وأضف أسماءها في <code>photos.json</code></p>
  </div>

  <!-- Viewer -->
  <div id="viewer"></div>

  <!-- Top HUD -->
  <div id="hud-top">
    <div class="hud-inner-top">
      <span id="title-text">معرض الصور</span>
      <span id="counter"></span>
    </div>
  </div>

  <!-- Bottom HUD -->
  <div id="hud-bottom">
    <div class="hud-inner-bottom">
      <button class="nav" id="btn-prev" aria-label="السابق">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div id="dots"></div>
      <button class="nav" id="btn-next" aria-label="التالي">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>

<script>
// ─── Config ────────────────────────────────────────
const PHOTOS_JSON = 'photos.json';
const PHOTOS_DIR  = 'photos/';
const TITLE       = 'معرض الصور';   // ← غيّر العنوان هنا
const MAX_ZOOM    = 4;               // أقصى تكبير
const DBL_ZOOM    = 2.5;            // تكبير النقر المزدوج
// ───────────────────────────────────────────────────

const viewer  = document.getElementById('viewer');
const dotsEl  = document.getElementById('dots');
const counter = document.getElementById('counter');
const loader  = document.getElementById('loader');
const emptyEl = document.getElementById('empty');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');

document.getElementById('title-text').textContent = TITLE;

let photos  = [];
let current = 0;
let slides  = [];

// حالة التكبير للصورة الحالية
let zoom = 1, panX = 0, panY = 0;

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
async function init() {
  try {
    const res = await fetch(PHOTOS_JSON + '?_=' + Date.now());
    if (!res.ok) throw new Error();
    photos = await res.json();
  } catch { photos = []; }

  loader.classList.add('fade-out');
  setTimeout(() => loader.classList.add('gone'), 500);

  if (!photos.length) { emptyEl.classList.add('show'); return; }

  build();
  goTo(0);
  bindTouch();
  bindKeyboard();
  showHint();
}

// ═══════════════════════════════
//  BUILD SLIDES
// ═══════════════════════════════
function build() {
  photos.forEach((file, i) => {
    const div = document.createElement('div');
    div.className = 'slide';

    const img = new Image();
    img.src = PHOTOS_DIR + file.split('/').map(encodeURIComponent).join('/');
    img.alt = file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    img.draggable = false;
    div.appendChild(img);
    viewer.appendChild(div);
    slides.push(div);
  });

  if (photos.length <= 20) {
    photos.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.addEventListener('click', () => { resetZoom(); goTo(i); });
      dotsEl.appendChild(d);
    });
  }
}

// ═══════════════════════════════
//  NAVIGATE
// ═══════════════════════════════
function goTo(index) {
  if (!slides.length) return;
  current = Math.max(0, Math.min(index, photos.length - 1));

  slides.forEach((s, i) => s.classList.toggle('active', i === current));
  document.querySelectorAll('.dot')
          .forEach((d, i) => d.classList.toggle('active', i === current));

  counter.textContent = photos.length > 1
    ? (current + 1) + ' / ' + photos.length : '';

  // preload neighbours
  [-1, 1].forEach(off => {
    const idx = current + off;
    if (idx >= 0 && idx < photos.length) {
      const img = slides[idx].querySelector('img');
      if (!img.src || img.src === location.href)
        img.src = PHOTOS_DIR + photos[idx].split('/').map(encodeURIComponent).join('/');
    }
  });
}

// ═══════════════════════════════
//  ZOOM HELPERS
// ═══════════════════════════════
function currentImg() {
  return slides[current] ? slides[current].querySelector('img') : null;
}

function applyTransform(animated) {
  const img = currentImg();
  if (!img) return;
  img.style.transition = animated ? 'transform 0.25s ease' : 'none';
  img.style.transform  = `scale(${zoom}) translate(${panX / zoom}px, ${panY / zoom}px)`;
}

function resetZoom(animated = true) {
  zoom = 1; panX = 0; panY = 0;
  applyTransform(animated);
}

// Clamp pan so image never drifts too far outside screen
function clampPan() {
  const img = currentImg();
  if (!img) return;
  const iw = img.naturalWidth  || img.offsetWidth;
  const ih = img.naturalHeight || img.offsetHeight;
  const vw = viewer.offsetWidth;
  const vh = viewer.offsetHeight;

  // displayed size after zoom
  const dispW = Math.min(iw, vw) * zoom;
  const dispH = Math.min(ih, vh) * zoom;

  const maxX = Math.max(0, (dispW - vw) / 2);
  const maxY = Math.max(0, (dispH - vh) / 2);

  panX = Math.max(-maxX, Math.min(maxX, panX));
  panY = Math.max(-maxY, Math.min(maxY, panY));
}

// ═══════════════════════════════
//  TOUCH EVENTS
// ═══════════════════════════════
function bindTouch() {

  // ── State ──
  let touches      = [];
  let startDist    = 0;
  let startZoom    = 1;
  let startPanX    = 0, startPanY    = 0;
  let startMidX    = 0, startMidY    = 0;
  let startSingleX = 0, startSingleY = 0;
  let isPinching   = false;

  // double-tap
  let lastTap = 0;

  // ─ touchstart ─
  viewer.addEventListener('touchstart', e => {
    touches = Array.from(e.touches);

    if (touches.length === 1) {
      // double-tap detection
      const now = Date.now();
      if (now - lastTap < 300) {
        handleDoubleTap(touches[0]);
        lastTap = 0;
        return;
      }
      lastTap = now;

      startSingleX = touches[0].clientX;
      startSingleY = touches[0].clientY;
      startPanX    = panX;
      startPanY    = panY;
      isPinching   = false;
    }

    if (touches.length === 2) {
      isPinching = true;
      startDist  = dist(touches[0], touches[1]);
      startZoom  = zoom;
      startMidX  = (touches[0].clientX + touches[1].clientX) / 2;
      startMidY  = (touches[0].clientY + touches[1].clientY) / 2;
      startPanX  = panX;
      startPanY  = panY;
    }
  }, { passive: true });

  // ─ touchmove ─
  viewer.addEventListener('touchmove', e => {
    touches = Array.from(e.touches);

    // ── Pinch zoom ──
    if (touches.length === 2 && isPinching) {
      e.preventDefault();
      const d = dist(touches[0], touches[1]);
      zoom = Math.max(1, Math.min(MAX_ZOOM, startZoom * (d / startDist)));

      // pan toward pinch midpoint
      const midX = (touches[0].clientX + touches[1].clientX) / 2;
      const midY = (touches[0].clientY + touches[1].clientY) / 2;
      panX = startPanX + (midX - startMidX);
      panY = startPanY + (midY - startMidY);

      clampPan();
      applyTransform(false);
      return;
    }

    // ── Single-finger pan (only when zoomed) ──
    if (touches.length === 1 && zoom > 1) {
      e.preventDefault();
      panX = startPanX + (touches[0].clientX - startSingleX);
      panY = startPanY + (touches[0].clientY - startSingleY);
      clampPan();
      applyTransform(false);
    }
  }, { passive: false });

  // ─ touchend ─
  viewer.addEventListener('touchend', e => {
    const remaining = e.touches.length;

    // finished pinch → stay at zoom
    if (isPinching && remaining < 2) {
      isPinching = false;
      // snap back to 1 if almost there
      if (zoom < 1.05) resetZoom();
      return;
    }

    // ── Swipe to navigate (only at zoom = 1) ──
    if (remaining === 0 && !isPinching && zoom <= 1) {
      const dx = e.changedTouches[0].clientX - startSingleX;
      const dy = e.changedTouches[0].clientY - startSingleY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) {
        resetZoom(false);
        dx > 0 ? goTo(current - 1) : goTo(current + 1);
      }
    }
  }, { passive: true });
}

// ─ Distance between two touches ─
function dist(a, b) {
  const dx = a.clientX - b.clientX;
  const dy = a.clientY - b.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// ─ Double-tap: toggle zoom ─
function handleDoubleTap(touch) {
  if (zoom > 1) {
    resetZoom();
  } else {
    // zoom centered on tap position
    const vw = viewer.offsetWidth  / 2;
    const vh = viewer.offsetHeight / 2;
    panX = (vw - touch.clientX) * (DBL_ZOOM - 1);
    panY = (vh - touch.clientY) * (DBL_ZOOM - 1);
    zoom = DBL_ZOOM;
    clampPan();
    applyTransform(true);
  }
}

// ═══════════════════════════════
//  BUTTONS
// ═══════════════════════════════
btnPrev.addEventListener('click', () => { resetZoom(false); goTo(current - 1); });
btnNext.addEventListener('click', () => { resetZoom(false); goTo(current + 1); });

// ═══════════════════════════════
//  KEYBOARD
// ═══════════════════════════════
function bindKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  { resetZoom(false); goTo(current + 1); }
    if (e.key === 'ArrowRight') { resetZoom(false); goTo(current - 1); }
    if (e.key === 'Escape')     resetZoom();
    if (e.key === '+' || e.key === '=') {
      zoom = Math.min(MAX_ZOOM, zoom * 1.3);
      clampPan(); applyTransform(true);
    }
    if (e.key === '-') {
      zoom = Math.max(1, zoom / 1.3);
      clampPan(); applyTransform(true);
    }
  });
}

// ═══════════════════════════════
//  HINT
// ═══════════════════════════════
function showHint() {
  if (photos.length < 2) return;
  const h = document.createElement('div');
  h.id = 'hint';
  h.textContent = '← اسحب للتنقل  •  انقر مرتين للتكبير →';
  document.body.appendChild(h);
  h.addEventListener('animationend', () => h.remove());
}

init();
</script>
</body>
</html>
